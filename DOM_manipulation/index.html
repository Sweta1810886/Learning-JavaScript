<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>I'm learning DOM Manipulation in JavaScript!</h1>
    
    <h2><span> is a simple heading 
        to demonstrate
         DOM manipulation.</span></h2>

    <p>This is a simple paragraph to demonstrate DOM manipulation.</p>
    
    <div class="container">
        <div>Hello</div>
        <div id="alpha">Hii</div>
        <div>Namaste</div>
    </div>
    <p class="paragraph">This is a paragraph with a class.</p>
    
    <div class="div">This is div</div>

    <button id="btn">Click me</button>

    <form action="">
        <input class="name" type="text" placeholder="Enter your name">
        <input class="email" type="email" placeholder="Enter your email">
        <button type="submit" id="submit">Submit</button>
    </form>

    <script src="script.js"></script>
    
</body>
</html>
